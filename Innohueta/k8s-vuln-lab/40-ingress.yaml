apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vuln-lab-ingress
  namespace: vuln-lab
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    # WebGoat на Java долго отвечает на первый запрос; без этого чаще 502/504 (не путать с 503)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "15"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: juicelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: juice-shop
                port:
                  number: 80
    - host: dvwalab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dvwa
                port:
                  number: 80
    - host: webgoatlab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webgoat
                port:
                  number: 8090
