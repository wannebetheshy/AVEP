# Шаблон: под без токена ServiceAccount на диске (уменьшает риск захвата API при RCE).
apiVersion: v1
kind: Pod
metadata:
  name: CHANGE_ME
  namespace: CHANGE_ME_NS
spec:
  automountServiceAccountToken: false
  serviceAccountName: CHANGE_ME_SA
  containers:
    - name: app
      image: CHANGE_ME_IMAGE
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
