apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy-auth
  template:
    metadata:
      labels:
        app: dummy-auth
    spec:
      containers:
      - name: python-server
        image: python:3.9-slim
        command: ["python", "-u", "/app/test_admin.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: dummy-auth-code
---
apiVersion: v1
kind: Service
metadata:
  name: dummy-auth-svc
spec:
  selector:
    app: dummy-auth
  ports:
  - port: 80
    targetPort: 8080
