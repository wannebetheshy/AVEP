# Egress: только DNS к CoreDNS. Поды не ходят на kubernetes.default, другие сервисы,
# metadata и «сканировать» внутреннюю сеть кластера.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lab-egress-dns-only
  namespace: vuln-lab
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: vuln-lab
  policyTypes:
    - Egress
  egress:
    # Типичные лейблы CoreDNS (minikube / kubeadm)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: coredns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
