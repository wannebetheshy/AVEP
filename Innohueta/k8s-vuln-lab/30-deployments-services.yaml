apiVersion: apps/v1
kind: Deployment
metadata:
  name: webgoat
  namespace: vuln-lab
  labels:
    app.kubernetes.io/name: webgoat
    app.kubernetes.io/part-of: vuln-lab
spec:
  replicas: 1
  # Recreate: никогда не держим два пода WebGoat (тяжёлый Java) — иначе на малом minikube
  # «old replicas pending termination» + нехватка RAM и зависание rollout.
  progressDeadlineSeconds: 7200
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: webgoat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webgoat
        app.kubernetes.io/part-of: vuln-lab
    spec:
      terminationGracePeriodSeconds: 20
      serviceAccountName: webgoat
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webgoat
          image: webgoat/webgoat:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          env:
            - name: TZ
              value: UTC
            # Не 8080: внутри образа/конфига порт 8080 иногда уже занят; 8090 — отдельный HTTP WebGoat
            - name: WEBGOAT_PORT
              value: "8090"
            - name: WEBGOAT_HOST
              value: "0.0.0.0"
            # Не задаём SERVER_PORT — иначе два источника server.port → «Port 8080 was already in use»
            # JDK 25 + WebGoat: запас под metaspace / native
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms384m -Xmx1200m"
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          # Пока JVM не bind’ит порт http — connection refused в Events; норма до конца startup.
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 120
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 420
            periodSeconds: 60
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: webgoat
  namespace: vuln-lab
  labels:
    app.kubernetes.io/name: webgoat
    app.kubernetes.io/part-of: vuln-lab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: webgoat
  ports:
    - name: http
      port: 8090
      targetPort: http
