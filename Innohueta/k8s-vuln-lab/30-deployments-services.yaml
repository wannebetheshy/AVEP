apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  namespace: vuln-lab
  labels:
    app.kubernetes.io/name: juice-shop
    app.kubernetes.io/part-of: vuln-lab
spec:
  replicas: 1
  # На малом minikube не держим два пода одного приложения во время rollout (иначе RAM/CPU и таймауты API).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: juice-shop
  template:
    metadata:
      labels:
        app.kubernetes.io/name: juice-shop
        app.kubernetes.io/part-of: vuln-lab
    spec:
      serviceAccountName: juice-shop
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: juice-shop
          image: bkimminich/juice-shop:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: juice-shop
  namespace: vuln-lab
  labels:
    app.kubernetes.io/name: juice-shop
    app.kubernetes.io/part-of: vuln-lab
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: juice-shop
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvwa
  namespace: vuln-lab
  labels:
    app.kubernetes.io/name: dvwa
    app.kubernetes.io/part-of: vuln-lab
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dvwa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dvwa
        app.kubernetes.io/part-of: vuln-lab
    spec:
      serviceAccountName: dvwa
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dvwa
          image: vulnerables/web-dvwa
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
