apiVersion: v1
kind: ServiceAccount
metadata:
  name: "sa-{{UUID}}"
  namespace: vuln-lab
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "rb-{{UUID}}"
  namespace: vuln-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lab-no-privileges # Берем роль из 02-rbac.yaml
subjects:
  - kind: ServiceAccount
    name: "sa-{{UUID}}"
    namespace: vuln-lab